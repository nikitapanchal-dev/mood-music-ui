<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood-Based Music UI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Your Music Based On Your Mood</h1>

        <section class="mood-btn">
            <button id="happy">Happy</button>
            <button id="sad">Sad</button>
            <button id="chill">Chill</button>
        </section>

        <p class="now-playing">No song playing</p>

        <ul class="list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
