<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card With Social Links</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <img src="my_image.jpg" alt="my profile picture">
        <h1>Nikita Panchal</h1>
        <h3 class="role">Frontend Developer</h3>
        <p class="bio">I love building websites...because i am a frontend developer and i want to become a full stack
            developer.</p>
        <div class="social">
            <a href="https://www.instagram.com/?flo=true" target="_blank" class="btn">Instagram</a>
            <a href="https://in.linkedin.com/" target="_blank" class="btn">LinkedIn</a>
            <a href="https://github.com/" target="_blank" class="btn">GitHub</a>
        </div>
    </div>
</body>

</html>
